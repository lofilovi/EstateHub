name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore EstateHub-code.slnx

      - name: Build
        run: dotnet build EstateHub-code.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test EstateHub-code.Tests/EstateHub-code.Tests.csproj --no-restore --configuration Release
