<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstateHub - Lägenhet</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <main class="app-shell">
        <aside class="side-nav" aria-label="Huvudmeny">
            <a class="brand-dot" href="dashboard.html" title="EstateHub">EH</a>
            <nav class="nav-stack">
                <a class="nav-dot" href="dashboard.html" title="Start">ST</a>
                <a class="nav-dot active" href="index.html" title="Lägenheter">LG</a>
                <a class="nav-dot" href="tenants.html" title="Hyresgäster">HG</a>
            </nav>
            <span class="nav-dot" aria-hidden="true">DB</span>
        </aside>

        <section class="content">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Lägenhetskort</p>
                    <h1 id="pageTitle">Laddar lägenhet...</h1>
                    <p id="pageSubtitle" class="lead">Hämtar objektinformation.</p>
                </div>
                <a class="button-link secondary" href="index.html">Till lägenheter</a>
            </header>

            <section class="dashboard-grid">
                <article id="content" class="card span-12">
                    <p class="muted">Laddar lägenhet...</p>
                </article>
            </section>
        </section>
    </main>

    <script>
        const content = document.getElementById('content');
        const pageTitle = document.getElementById('pageTitle');
        const pageSubtitle = document.getElementById('pageSubtitle');
        const params = new URLSearchParams(window.location.search);
        const apartmentId = params.get('id');

        function tenantName(tenant) {
            if (!tenant) {
                return 'Ingen hyresgäst';
            }

            return [tenant.firstName, tenant.lastName].filter(Boolean).join(' ').trim() || 'Okänd hyresgäst';
        }

        function formatDate(value) {
            return value ? new Date(value).toLocaleDateString('sv-SE') : '-';
        }

        function features(apartment) {
            const items = [
                apartment.electricityIncluded ? 'El ingår' : null,
                apartment.waterIncluded ? 'Vatten ingår' : null,
                apartment.internetIncluded ? 'Internet ingår' : null,
                apartment.balcony ? 'Balkong' : null,
                apartment.furnished ? 'Möblerad' : null
            ].filter(Boolean);

            return items.length
                ? items.map((item) => `<span class="feature">${item}</span>`).join('')
                : '<span class="muted">Inga egenskaper valda</span>';
        }

        async function loadApartment() {
            if (!apartmentId) {
                pageTitle.textContent = 'Ingen lägenhet vald';
                pageSubtitle.textContent = 'Gå tillbaka och välj en lägenhet.';
                content.innerHTML = '<p class="muted">Ingen lägenhet vald.</p>';
                return;
            }

            const response = await fetch(`/api/apartments/${apartmentId}`);
            if (!response.ok) {
                pageTitle.textContent = 'Lägenheten hittades inte';
                pageSubtitle.textContent = 'Kontrollera att objektet finns kvar.';
                content.innerHTML = '<p class="muted">Lägenheten hittades inte.</p>';
                return;
            }

            const apartment = await response.json();
            pageTitle.textContent = `Lägenhet ${apartment.apartmentNumber}`;
            pageSubtitle.textContent = `${apartment.property?.address ?? '-'}, ${apartment.property?.city ?? ''}`;
            const imageUrl = apartment.imageUrl || 'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200';
            content.innerHTML = `
                <img src="${imageUrl}" alt="Apartment ${apartment.apartmentNumber}" style="width:100%; max-height:360px; object-fit:cover; border-radius:18px; margin-bottom:24px;">
                <div class="detail-grid">
                    <div class="detail"><span class="label">Storlek</span>${apartment.size} kvm</div>
                    <div class="detail"><span class="label">Rum</span>${apartment.rooms || 0}</div>
                    <div class="detail"><span class="label">Våning</span>${apartment.floor ?? 0}</div>
                    <div class="detail"><span class="label">Hyra</span>${apartment.rent} kr</div>
                    <div class="detail"><span class="label">Status</span>${apartment.status || 'Ledig'}</div>
                    <div class="detail"><span class="label">Tillgänglig från</span>${formatDate(apartment.availableFrom)}</div>
                    <div class="detail"><span class="label">Hyresgäst</span>${tenantName(apartment.tenant)}</div>
                    <div class="detail"><span class="label">Telefon</span>${apartment.tenant?.mobilePhone || apartment.tenant?.phone || '-'}</div>
                    <div class="detail"><span class="label">E-post</span>${apartment.tenant?.email || '-'}</div>
                </div>

                <h2 style="margin-top: 24px;">Egenskaper</h2>
                <div>${features(apartment)}</div>
            `;
        }

        loadApartment();
    </script>
</body>
</html>
